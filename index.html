<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no">
<title>Quiz — Pinnacle MCQ</title>
<style>
/* Saari styling yahan hai (Same as before) */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0e1621;--feed:#17212b;--card:#1e2c3a;--card2:#243340;--border:#2a3a4d;--blue:#2b9fea;--blue2:#1a7fc4;--green:#3db85c;--green2:#2a8f44;--red:#e5534b;--red2:#b83e37;--yellow:#f0b429;--text:#e8eaed;--sub:#7d96ad;--sub2:#5a7185;--shadow:0 2px 12px rgba(0,0,0,0.45);}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:sans-serif;overflow-x:hidden;}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.4s;}
#splash.hide{opacity:0;pointer-events:none;}
#nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(14,22,33,0.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:200;padding:8px 0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;font-size:10px;color:var(--sub);}
.nav-item.active{color:var(--blue);font-weight:bold;}
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:70px;}
.screen.active{display:flex;}
.topic-card{background:var(--card);border-radius:13px;padding:15px;margin:8px;border:1px solid var(--border);cursor:pointer;}
.quiz-header{position:sticky;top:0;background:var(--bg);padding:10px;border-bottom:1px solid var(--border);z-index:100;}
.opt-btn{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin:5px 0;color:var(--text);text-align:left;cursor:pointer;}
.opt-btn.correct{background:var(--green2);border-color:var(--green);}
.opt-btn.wrong{background:var(--red2);border-color:var(--red);}
.fact-box{background:#0d1e30;padding:10px;margin:10px;border-radius:8px;display:none;}
.fact-box.show{display:block;}
</style>
</head>
<body>

<div id="splash"><h1>🎯 Loading Quiz...</h1></div>

<div id="home-screen" class="screen active">
  <div style="padding:20px; background:linear-gradient(135deg,#0d2035,#1a2d40);">
    <h2>Pinnacle GS Quiz</h2>
    <button onclick="startQuiz('random')" style="padding:10px 20px; background:var(--blue); color:white; border:none; border-radius:8px; margin-top:10px;">Start Practice ▶</button>
  </div>
  <div id="topic-grid" style="padding:10px;"></div>
</div>

<div id="eng-screen" class="screen">
  <div style="padding:20px;">
    <h2>English Practice</h2>
    <button onclick="startQuiz('random','eng')" style="padding:10px 20px; background:var(--blue); color:white; border:none; border-radius:8px;">Start English ▶</button>
  </div>
  <div id="eng-topic-grid" style="padding:10px;"></div>
</div>

<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <button onclick="exitQuiz()" style="background:none; color:var(--blue); border:none; font-weight:bold;">‹ Back</button>
    <span id="qh-topic">Quiz</span>
    <div id="qs-score" style="float:right;">Score: 0</div>
  </div>
  <div id="feed" style="padding:10px;"></div>
</div>

<div id="nav-bar">
  <div class="nav-item active" onclick="switchTab('home')">📚 GS</div>
  <div class="nav-item" onclick="switchTab('eng')">📝 English</div>
  <div class="nav-item" onclick="switchTab('home')">📊 Stats</div>
</div>

<!-- DATA LOADING -->
<script src="gs-data.js"></script>
<script src="english-data.js"></script>

<script>
// --- BRAIN OF THE APP ---
let G = { totalDone:0, totalCorrect:0 };
let S = { queue:[], idx:0, correct:0, wrong:0 };

const ALL_MCQ = gsQuestions.map((r,i)=>({
  id:i, q:r[0], a:r[1], b:r[2], c:r[3], d:r[4], ans:r[5], fact:r[6], topic:r[7], sub:r[8]
}));

const ALL_ENG_MCQ = englishQuestions.map((r,i)=>({
  id:1000+i, q:r[0], a:r[1], b:r[2], c:r[3], d:r[4], ans:r[5], fact:r[6], topic:r[7], sub:r[8]
}));

function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(tab + '-screen').classList.add('active');
}

function startQuiz(mode, dataset='gs'){
  let pool = dataset === 'eng' ? ALL_ENG_MCQ : ALL_MCQ;
  S.queue = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
  S.idx = 0; S.correct = 0; S.wrong = 0;
  document.getElementById('feed').innerHTML = '';
  switchTab('quiz');
  showQuestion();
}

function showQuestion(){
  if(S.idx >= S.queue.length){
    document.getElementById('feed').innerHTML = "<h2>Quiz Finished!</h2><button onclick='switchTab(\"home\")'>Go Home</button>";
    return;
  }
  let q = S.queue[S.idx];
  let html = `<div class="topic-card">
    <p><b>Q${S.idx+1}: ${q.q}</b></p>
    <button class="opt-btn" onclick="checkAns(this,'a','${q.ans}','${S.idx}')">A) ${q.a}</button>
    <button class="opt-btn" onclick="checkAns(this,'b','${q.ans}','${S.idx}')">B) ${q.b}</button>
    <button class="opt-btn" onclick="checkAns(this,'c','${q.ans}','${S.idx}')">C) ${q.c}</button>
    <button class="opt-btn" onclick="checkAns(this,'d','${q.ans}','${S.idx}')">D) ${q.d}</button>
    <div id="fact-${S.idx}" class="fact-box">💡 ${q.fact}</div>
  </div>`;
  document.getElementById('feed').innerHTML = html;
}

function checkAns(btn, choice, correct, idx){
  if(choice === correct){
    btn.classList.add('correct');
    S.correct++;
  } else {
    btn.classList.add('wrong');
    S.wrong++;
  }
  document.getElementById(`fact-${idx}`).classList.add('show');
  document.getElementById('qs-score').innerText = `Score: ${S.correct}`;
  setTimeout(() => { S.idx++; showQuestion(); }, 2000);
}

function exitQuiz(){ switchTab('home'); }

window.onload = () => {
  setTimeout(() => { document.getElementById('splash').classList.add('hide'); }, 1000);
  renderHomeTopics();
};

function renderHomeTopics(){
  let topics = ["Art & Culture", "Sports", "History"];
  let html = "";
  topics.forEach(t => {
    html += `<div class="topic-card" onclick="startQuiz('topic')"><h3>${t}</h3></div>`;
  });
  document.getElementById('topic-grid').innerHTML = html;
}
</script>
</body>
</html>
